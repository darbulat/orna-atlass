services:
  api:
    environment:
      APP_ENVIRONMENT: production
      LOCAL_ADMIN_ENABLED: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set S3_ENDPOINT_URL in .env}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:?set S3_PUBLIC_ENDPOINT_URL in .env}
      HLS_TOKEN_SECRET: ${HLS_TOKEN_SECRET:?set a dedicated HLS_TOKEN_SECRET in .env}
      HLS_TOKEN_KEY_ID: ${HLS_TOKEN_KEY_ID:-primary}
      HLS_TOKEN_PREVIOUS_SECRETS: ${HLS_TOKEN_PREVIOUS_SECRETS:-{}}
    depends_on: !override
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set S3_ENDPOINT_URL in .env}
    ports: !override
      - "127.0.0.1:9101:9101"
    depends_on: !override
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  storage-cleanup-worker:
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set S3_ENDPOINT_URL in .env}
    depends_on: !override
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  pipeline-recovery-worker:
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set S3_ENDPOINT_URL in .env}
    depends_on: !override
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    command: sh -c "npm install && npm run build && npm run start"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env}
      API_SERVER_URL: http://api:8000

  postgres:
    ports: !override
      - "127.0.0.1:5432:5432"

  redis:
    ports: !override
      - "127.0.0.1:6379:6379"

  minio:
    profiles: ["local-minio"]

  minio-init:
    profiles: ["local-minio"]

volumes:
  postgres-data:
