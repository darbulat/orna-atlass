name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: orna_atlas
          POSTGRES_USER: orna
          POSTGRES_PASSWORD: orna
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orna -d orna_atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://orna:orna@localhost:5432/orna_atlas
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_REGION: us-east-1
      S3_PRIVATE_BUCKET: orna-audio-private
      S3_PUBLIC_BUCKET: orna-media-public
      S3_ACCESS_KEY_ID: orna
      S3_SECRET_ACCESS_KEY: ornaorna
    steps:
      - uses: actions/checkout@v4
      - name: Start S3-compatible storage
        run: >-
          docker run --detach --name orna-ci-minio --publish 9000:9000
          --env MINIO_ROOT_USER=orna --env MINIO_ROOT_PASSWORD=ornaorna
          minio/minio:RELEASE.2024-12-18T13-15-44Z server /data
      - name: Wait for S3-compatible storage
        run: >-
          timeout 60 sh -c
          'until curl --fail --silent http://localhost:9000/minio/health/live; do sleep 1; done'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install '.[dev]'
      - run: python -m ruff check .
      - run: alembic upgrade head
      - run: alembic check
      - name: Verify geospatial and lifecycle migration reversibility
        env:
          APP_ENVIRONMENT: test
          RUN_MIGRATION_CYCLE_CHECK: "1"
        run: python -m orna_atlas.app.scripts.verify_migration_cycle
      - run: python -m pytest
      - name: Prepare integration buckets
        run: >-
          python -c "import boto3;
          client=boto3.client('s3', endpoint_url='http://localhost:9000',
          aws_access_key_id='orna', aws_secret_access_key='ornaorna', region_name='us-east-1');
          [client.create_bucket(Bucket=name) for name in ('orna-audio-private','orna-media-public')]"
      - name: Test real dependencies
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: python -m pytest -m integration tests/integration
      - name: Build API image without local secrets
        run: docker build --file Dockerfile.api --tag orna-atlas-api:test .
      - name: Build dedicated ML worker image
        run: docker build --file Dockerfile.worker --tag orna-atlas-worker:test .
      - name: Verify installed package outside source directory
        run: >-
          docker run --rm --workdir /tmp --entrypoint python orna-atlas-api:test
          -c "import importlib.util, os, orna_atlas;
          assert not os.path.exists('/app/.env');
          assert importlib.util.find_spec('tensorflow') is None;
          assert importlib.util.find_spec('birdnetlib') is None"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run test:unit
      - working-directory: web
        run: npm run build
      - working-directory: web
        run: npm run api:check
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm run lint
      - working-directory: web
        run: npx playwright install --with-deps chromium
      - working-directory: web
        run: npm run test:e2e
