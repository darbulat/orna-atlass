services:
  api:
    ports: !override []

  web:
    ports: !override []

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?set PUBLIC_HOST in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./.deploy/certbot/conf:/etc/letsencrypt:ro
      - ./.deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
