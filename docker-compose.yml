services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json, sys, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)); sys.exit(1) if payload.get("status") != "ok" else sys.exit(0)
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    ports:
      - "9101:9101"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  storage-cleanup-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m orna_atlas.app.workers.storage_cleanup worker
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  pipeline-recovery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m orna_atlas.app.workers.pipeline_recovery worker
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./web:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_SERVER_URL: http://api:8000
    depends_on:
      - api

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: orna_atlas
      POSTGRES_USER: orna
      POSTGRES_PASSWORD: orna
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orna -d orna_atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: orna
      MINIO_ROOT_PASSWORD: ornaorna
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 orna ornaorna &&
      mc mb local/orna-audio-private --ignore-existing &&
      mc mb local/orna-media-public --ignore-existing &&
      exit 0"

volumes:
  postgres-data:
  minio-data:
