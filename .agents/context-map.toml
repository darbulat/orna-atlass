version = 1

[defaults]
max_files = 14
max_bytes = 131072
excluded_directories = [
  ".git",
  ".next",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "__pycache__",
  "build",
  "coverage",
  "dist",
  "htmlcov",
  "model-cache",
  "node_modules",
  "test-results",
]
excluded_names = [
  ".env",
  ".env.*",
  ".npmrc",
  ".pypirc",
  "*.key",
  "*.p12",
  "*.pfx",
  "*.pem",
  "*credential*",
  "*secret*",
  "credentials.json",
  "id_rsa*",
  "secrets.*",
]
text_extensions = [
  ".cjs",
  ".css",
  ".html",
  ".ini",
  ".js",
  ".json",
  ".md",
  ".mjs",
  ".py",
  ".sql",
  ".template",
  ".toml",
  ".ts",
  ".tsx",
  ".txt",
  ".yaml",
  ".yml",
]
text_names = ["Dockerfile", "Dockerfile.api", "Dockerfile.worker"]

[core]
files = ["AGENTS.md", "docs/CURRENT_STATE.md"]

[roles.architect]
contract = ".agents/roles/architect.md"

[roles.backend]
contract = ".agents/roles/backend.md"

[roles.frontend]
contract = ".agents/roles/frontend.md"

[roles.test]
contract = ".agents/roles/test.md"

[roles.security]
contract = ".agents/roles/security.md"

[roles.documentation]
contract = ".agents/roles/documentation.md"

[[domains]]
name = "public-privacy-and-atlas"
keywords = [
  "atlas",
  "bbox",
  "coordinate",
  "dawn",
  "geospatial",
  "location",
  "postgis",
  "privacy",
  "public projection",
  "sunrise",
  "атлас",
  "геодан",
  "координат",
  "локац",
  "приват",
  "рассвет",
]
path_roots = [
  "orna_atlas/app/modules/atlas",
  "orna_atlas/app/modules/locations",
  "orna_atlas/app/integrations/sunrise.py",
  "web/components/atlas",
  "web/app/atlas",
]
files = [
  "docs/DOMAIN_RULES.md",
  "docs/adr/0001-public-coordinate-projection.md",
]
patterns = [
  "orna_atlas/app/modules/atlas/*.py",
  "orna_atlas/app/modules/locations/*.py",
  "web/components/atlas/*.ts",
  "web/components/atlas/*.tsx",
]

